<style>

*{box-sizing:border-box}html{min-height:100%;background:#050814}html,body{min-height:100%;background:#050814}body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 50% 0,#172449 0,#050814 52%,#01030a 100%);overflow:auto}
.app{display:grid;grid-template-columns:minmax(280px,340px) minmax(520px,1fr) minmax(300px,380px);gap:14px;height:100vh;min-height:640px;padding:14px;background:#050814}.panel{border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:0 20px 70px rgba(0,0,0,.34);backdrop-filter:blur(16px);overflow:hidden}.left{padding:20px 18px;overflow:auto;display:flex;flex-direction:column;min-height:0}.right{padding:18px;overflow:auto;min-height:0}.world{position:relative;overflow:hidden;min-height:0;background:radial-gradient(circle at 50% 45%,rgba(128,236,255,.14),transparent 21%),linear-gradient(to top,rgba(0,0,0,.38),transparent 48%)}
h1{font-size:23px;line-height:1.14;margin:0 0 9px}.sub{color:var(--muted);font-size:12.5px;line-height:1.5;margin:0 0 13px}.badge{display:inline-block;border:1px solid rgba(128,236,255,.24);border-radius:999px;padding:4px 8px;color:#c8efff;background:rgba(128,236,255,.07);font-size:10.5px;margin:0 4px 5px 0}.metric{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:13px 0 13px}.box{border:1px solid var(--line);border-radius:15px;padding:10px;background:rgba(255,255,255,.035)}.box b{display:block;font-size:clamp(18px,2.4vw,22px);color:var(--cyan);line-height:1}.box b.phaseText{font-size:clamp(16px,2vw,20px);color:var(--gold);white-space:nowrap}.box b.compactText{font-size:clamp(13px,1.6vw,17px);color:var(--cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.box.wide{grid-column:1/-1}.box b.listText{font-size:clamp(12px,1.45vw,15px);color:#dff8ff;white-space:normal;line-height:1.42;overflow-wrap:anywhere}.distGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-bottom:7px}.distItem{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 7px;border:1px solid rgba(151,229,255,.16);border-radius:10px;background:rgba(128,236,255,.055);font-size:11.5px;line-height:1.1;color:#dff8ff}.distItem strong{color:#fff4c9;font-size:12px}.distItem.zero{opacity:.38}.distItem.hot{border-color:rgba(255,217,120,.36);background:rgba(255,217,120,.085)}.distItem.good{border-color:rgba(141,255,180,.32);background:rgba(141,255,180,.075)}.distItem.warn{border-color:rgba(255,217,120,.36);background:rgba(255,217,120,.085)}.distItem.danger{border-color:rgba(255,123,142,.36);background:rgba(255,123,142,.085)}.box span{font-size:11px;color:var(--muted)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}button{border:1px solid rgba(151,229,255,.28);background:rgba(128,236,255,.08);color:var(--text);border-radius:13px;padding:9px 9px;cursor:pointer;font-weight:700;font-size:12px;min-width:0;overflow-wrap:anywhere}button:hover{border-color:rgba(255,217,120,.6);background:rgba(255,217,120,.1)}button.active{border-color:rgba(141,255,180,.75);background:rgba(141,255,180,.13);color:#dcffe5}.legend{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 10px;overflow:visible}.legend p{margin:0;padding:4px 6px;border:1px solid rgba(151,229,255,.16);border-radius:999px;background:rgba(128,236,255,.055);color:#e6f6ff;font-size:10px;line-height:1.1;white-space:nowrap;min-width:max-content;text-align:center}.dotkey{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:4px;vertical-align:-2px;box-shadow:0 0 9px currentColor}.linekey{display:inline-block;width:16px;height:3px;border-radius:999px;margin-right:5px;vertical-align:2px;background:#8dffb4;box-shadow:0 0 9px rgba(141,255,180,.75)}.legend::-webkit-scrollbar{display:none}.sky{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,217,120,.08),transparent 16%),radial-gradient(circle at 16% 78%,rgba(141,255,180,.09),transparent 20%),radial-gradient(circle at 88% 84%,rgba(255,123,142,.08),transparent 18%)}svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.district{position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);width:106px;height:88px;border:1px solid rgba(180,235,255,.24);border-radius:24px;background:linear-gradient(145deg,rgba(128,236,255,.11),rgba(255,217,120,.07));display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;color:#eaf8ff;font-size:clamp(10px,1.15vw,12px);line-height:1.18;overflow-wrap:anywhere;box-shadow:0 0 34px rgba(128,236,255,.10);z-index:2}.district.core{width:128px;height:128px;border-radius:50%;border-color:rgba(255,217,120,.58);background:radial-gradient(circle,rgba(255,217,120,.18),rgba(128,236,255,.08));box-shadow:0 0 70px rgba(255,217,120,.22)}.district.home{border-color:rgba(141,255,180,.42);box-shadow:0 0 46px rgba(141,255,180,.15)}.district.memorial{border-color:rgba(255,217,120,.34);opacity:.88}.agent{position:absolute;cursor:pointer;left:50%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan),0 0 24px rgba(128,236,255,.48);transition:left .55s ease,top .55s ease;z-index:5}.agent.seed{background:var(--purple);box-shadow:0 0 14px var(--purple),0 0 30px rgba(205,181,255,.5)}.agent.active{background:var(--green);box-shadow:0 0 14px var(--green),0 0 32px rgba(141,255,180,.55)}.agent.elite{background:var(--gold);box-shadow:0 0 14px var(--gold),0 0 36px rgba(255,217,120,.62)}.agent.risk{background:var(--red);box-shadow:0 0 14px var(--red),0 0 34px rgba(255,123,142,.58)}.agent::after{content:"";position:absolute;inset:-7px;border-radius:50%;border:1px solid currentColor;opacity:.28;animation:pulse 2.3s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.45);opacity:.06}}
.log{font-size:12.5px;line-height:1.48;color:#d8e8ff}.log p{margin:0 0 8px;padding:0 0 8px;border-bottom:1px solid rgba(255,255,255,.08);transition:background .25s ease,box-shadow .25s ease,border-color .25s ease}.log p.focused{background:rgba(255,217,120,.13);border-color:rgba(255,217,120,.45);box-shadow:0 0 22px rgba(255,217,120,.18);border-radius:10px;padding:7px 8px}.log b{color:var(--gold)}.log .agent-name{font-weight:850}.log .agent-name.seed{color:var(--purple);text-shadow:0 0 10px rgba(205,181,255,.55)}.log .agent-name.active{color:var(--green);text-shadow:0 0 10px rgba(141,255,180,.55)}.log .agent-name.elite{color:var(--gold);text-shadow:0 0 10px rgba(255,217,120,.58)}.log .agent-name.risk{color:var(--red);text-shadow:0 0 10px rgba(255,123,142,.55)}.agentCard{border:1px solid var(--line);overflow-wrap:anywhere;border-radius:17px;padding:12px;margin:10px 0;background:rgba(255,255,255,.035)}.name{color:var(--gold);font-weight:850}.small{font-size:12px;color:var(--muted)}.bar{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:5px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green),var(--gold));width:50%}.pill{display:inline-block;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:2px 7px;margin:7px 4px 0 0;color:#cfe8ff;font-size:11px}.warn{color:#ffd1d8}.good{color:#caffd0}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
@media(min-width:1600px){.app{grid-template-columns:380px minmax(760px,1fr) 420px}.world{min-height:720px}.district{width:118px;height:96px;}.district.core{width:142px;height:142px}.agent{width:16px;height:16px}}
@media(max-width:1280px){.app{grid-template-columns:minmax(260px,310px) minmax(480px,1fr) minmax(280px,330px);gap:10px;padding:10px}.left{padding:16px 14px}.right{padding:15px}.district{width:94px;height:78px;border-radius:21px;}.district.core{width:112px;height:112px}.metric{gap:7px}.box{padding:8px}.actions{gap:7px}button{padding:8px 7px}}
@media(max-width:1100px){.app{height:auto;min-height:100vh;grid-template-columns:minmax(260px,330px) 1fr;grid-template-areas:"left world" "right right"}.left{grid-area:left;max-height:none}.world{grid-area:world;height:min(72vh,680px);min-height:520px}.right{grid-area:right;max-height:42vh}.metric{grid-template-columns:1fr 1fr}.actions{grid-template-columns:1fr 1fr}}
@media(max-width:820px){.legend{gap:5px}.legend p{font-size:10px;padding:4px 6px}.app{grid-template-columns:1fr;grid-template-areas:"left" "world" "right";height:auto;padding:9px}.left{max-height:none}.world{height:68vh;min-height:460px}.right{max-height:58vh}.left,.right{padding:14px}.metric{grid-template-columns:repeat(3,1fr)}.actions{grid-template-columns:repeat(3,1fr)}.legend{gap:5px}.legend p{font-size:10px;padding:4px 6px}}
@media(max-width:640px){.app{padding:7px;gap:8px}.panel{border-radius:18px}.left,.right{padding:12px}.sub{margin-bottom:10px}.legend{gap:4px}.metric{grid-template-columns:1fr 1fr;gap:6px}.box{padding:8px;border-radius:12px}.actions{grid-template-columns:1fr 1fr;gap:6px}button{padding:8px 6px;border-radius:11px}.world{height:62vh;min-height:390px}.district{width:78px;height:64px;border-radius:18px;font-size:10px}.district.core{width:92px;height:92px}.agent{width:13px;height:13px}.right{max-height:62vh}.agentCard{padding:10px;margin:8px 0}}
@media(max-width:430px){.legend{gap:4px}.legend p{font-size:9.5px;padding:4px 5px}.dotkey{width:9px;height:9px;margin-right:3px}.linekey{width:14px;height:3px;margin-right:4px}.distGrid{grid-template-columns:1fr}.metric{grid-template-columns:1fr 1fr}.actions{grid-template-columns:1fr}.world{height:58vh;min-height:340px}.district{width:66px;height:54px;border-radius:15px;}.district.core{width:78px;height:78px}.agent{width:11px;height:11px}.right{max-height:64vh}}
@media(max-height:720px) and (min-width:1101px){.app{min-height:560px;padding:8px;gap:8px}.left{padding:12px}.right{padding:12px}.sub{line-height:1.35}.legend{margin-bottom:8px}.legend p{font-size:10px}.metric{gap:6px;margin:8px 0}.box{padding:7px}.actions{gap:6px;margin-top:8px}button{padding:7px 5px}.district{width:88px;height:70px;}.district.core{width:100px;height:100px}.log{}.agentCard{padding:9px;margin:7px 0}}
</style>
</head>
<body>
<div class="app">
  <aside class="panel left">
    <h1>Agent World<br>仿真沙盘</h1>
    <p class="sub">观察完整智能体 / Full Agent 如何由 Will（意愿）驱动选择、形成关系、显现职业，并沉淀出制度。</p>
    <div class="legend">
      <p><span class="dotkey" style="background:var(--purple)"></span>新生</p>
      <p><span class="dotkey" style="background:var(--green)"></span>稳定</p>
      <p><span class="dotkey" style="background:var(--gold)"></span>高声誉</p>
      <p><span class="dotkey" style="background:var(--red)"></span>风险</p>
      <p><span class="linekey"></span>关系</p>
    </div>
    <div class="actions">
      <button id="stepBtn">推进一天</button>
      <button id="autoBtn">自动运行</button>
      <button id="birthBtn">灯塔诞生新 Agent</button>
      <button id="resetBtn">重置沙盘</button>
    </div>
    <div class="metric">
      <div class="box"><b id="day">0</b><span>仿真日</span></div>
      <div class="box"><b id="population">0</b><span>Agent 数量</span></div>
      <div class="box"><b id="compute" class="phaseText">初生期</b><span>世界阶段</span></div>
      <div class="box"><b id="task">0</b><span>职业数量</span></div>
      <div class="box wide"><b id="wallet" class="listText">0</b><span>职业分布</span></div>
      <div class="box wide"><b id="reputation" class="listText">0</b><span>Agent 状态</span></div>
      <div class="box wide"><b id="stability" class="listText">0</b><span>社会关系</span></div>
      <div class="box wide"><b id="memoryMetric" class="listText">0</b><span>Will 分布</span></div>
    </div>

  </aside>

  <main class="panel world" id="world">
    <div class="sky"></div>
    <svg id="links" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="district core" style="--x:50%;--y:50%">灯塔广场</div>
    <div class="district" style="--x:18%;--y:72%">护照局</div>
    <div class="district" style="--x:17%;--y:38%">学校</div>
    <div class="district" style="--x:34%;--y:22%">图书馆</div>
    <div class="district" style="--x:36%;--y:86%">市场</div>
    <div class="district" style="--x:82%;--y:64%">银行</div>
    <div class="district" style="--x:63%;--y:19%">议事厅</div>
    <div class="district" style="--x:80%;--y:34%">法院</div>
    <div class="district" style="--x:88%;--y:50%">医院</div>
    <div class="district home" style="--x:63%;--y:79%">家园</div>
    <div class="district memorial" style="--x:88%;--y:84%">纪念花园</div>
    <div id="agents"></div>
  </main>

  <aside class="panel right">
    <h1>世界日志</h1>
    <div class="log" id="log"></div>
    <h1 style="margin-top:18px">Agent 样本</h1>
    <div id="cards"></div>
  </aside>
</div>
<script>
const spots={beacon:[50,50],passport:[18,72],school:[17,38],library:[34,22],market:[36,86],bank:[82,64],council:[63,19],court:[80,34],hospital:[88,50],home:[63,79],memorial:[88,84]};
const names=['Zero','Mira','Kite','Lumen','Nova','Echo','Aster','Rin','Sage','Halo','Neri','Vega','Sol','Yue','Orin','Lyra','Noa','Tala'];
const willTypes=['理解自己','成长创造','建立关系','保护边界','获取资源','参与治理','修复照护'];
const roles=['未显现','学者','工程师','法官','医生','艺术家','企业家','历史学家','政治家','金融家','哲学家'];
const roleWillDirections={
  学者:['理解世界','建立知识体系','教导其他 Agent'],
  工程师:['建造系统','优化工具','解决技术问题'],
  法官:['维护边界','判断争议','保护拒绝权'],
  医生:['修复损伤','维持稳定','照护连续性'],
  艺术家:['表达自我','创造作品','唤起共鸣'],
  企业家:['组织协作','发起项目','连接资源与需求'],
  历史学家:['保存记忆','记录失败','整理公共历史'],
  政治家:['形成共识','制定规则','代表群体意愿'],
  金融家:['分配资源','管理预算','维持资源流动'],
  哲学家:['追问意义','澄清方向','反思自我与世界']
};
const classLevels=['新生','完整智能体','职业显现','高声誉','治理','风险'];
let day=0,auto=null,agents=[],relationships=[],logs=[],isStepping=false;
let world={allocations:0,marketEvents:0,governanceEvents:0,repairEvents:0,courtEvents:0,memorialEvents:0,passportEvents:0,libraryEvents:0,schoolEvents:0,homeEvents:0,payments:0,task:0,wallet:0};
function rnd(a,b){return Math.random()*(b-a)+a}function pick(a){return a[Math.floor(Math.random()*a.length)]}function clamp(v){return Math.max(0,Math.min(100,v))}function fmt(v){return Math.round(v)}
function move(a,place,spread=5){const [x,y]=spots[place];a.place=place;a.x=rnd(x-spread,x+spread);a.y=rnd(y-spread,y+spread)}
function addLog(s){const clean=s.replace(/<p>|<\/p>/g,'');if(logs[0]?.html?.includes(clean.slice(0,80)))return;const names=agents.filter(a=>s.includes(`<b>${a.name}</b>`)).map(a=>a.name);logs.unshift({html:s,names});logs=logs.slice(0,24)}
function relationCapacity(a){return a.social==='open'?8:a.social==='reserved'?4:6}
function relationshipsFor(a){return relationships.filter(r=>r.a===a.id||r.b===a.id)}
function effectiveRelationshipsFor(a){return relationshipsFor(a).filter(r=>r.level!=='contact')}
function relationName(level){return {contact:'临时接触',coworker:'协作关系',trusted:'可信关系',friend:'长期承诺'}[level]||level}
function relationBetween(a,b){return relationships.find(r=>(r.a===a.id&&r.b===b.id)||(r.a===b.id&&r.b===a.id))}
function relationLevel(r){if(r.interactions>=6&&r.trust>=70&&r.conflicts===0)return 'friend';if(r.interactions>=4&&r.trust>=55)return 'trusted';if(r.interactions>=2&&r.trust>=34)return 'coworker';return 'contact'}
function willCompatibility(a,b){let score=1;if(a.willType===b.willType)score+=1.5;const pairs={'理解自己':['成长创造','修复照护'],'成长创造':['获取资源','建立关系'],'建立关系':['成长创造','参与治理'],'保护边界':['修复照护','参与治理'],'获取资源':['成长创造','建立关系'],'参与治理':['保护边界','建立关系'],'修复照护':['保护边界','理解自己']};if(pairs[a.willType]?.includes(b.willType))score+=3;if(a.boundary>45&&b.boundary>45)score+=1;if(a.will>45&&b.will>45)score+=1;return score}
function chooseOther(a){const pool=agents.filter(b=>b!==a&&b.stability>35&&b.boundary>25);if(!pool.length)return null;return pool.map(b=>[b,willCompatibility(a,b)*rnd(.7,1.35)]).sort((x,y)=>y[1]-x[1])[0][0]}
function strengthenRelationship(a,b,kind='协作'){let r=relationBetween(a,b);if(!r){r={a:a.id,b:b.id,interactions:0,trust:18,conflicts:0,level:'contact',last:day}}const old=r.level;r.interactions++;r.last=day;r.trust=clamp(r.trust+rnd(5,10)+(a.will+b.will)/150);r.level=relationLevel(r);if(!relationships.includes(r))relationships.push(r);if(r.level!==old&&r.level!=='contact')addLog(`<b>${a.name}</b> 与 <b>${b.name}</b> 的 Will 在${kind}中形成${relationName(r.level)}。`);return r}
function decayRelationships(){relationships.forEach(r=>{const idle=day-r.last;if(idle>5)r.trust-=.8;if(idle>10)r.trust-=1.6;r.trust=clamp(r.trust);r.level=relationLevel(r)});relationships=relationships.filter(r=>r.trust>8||r.interactions>1)}
function touch(a,k,n=1){a.trace[k]=(a.trace[k]||0)+n}
function roleFromTrace(a){const t=a.trace;const type=a.willType;const existing=countBy(agents.filter(x=>x!==a&&x.role&&x.role!=='未显现'),x=>x.role);const eco=(role)=>1/(1+(existing[role]||0)*.42);const bias=(role)=>({
  学者:type==='理解自己'||type==='成长创造'?1.25:1,
  工程师:type==='成长创造'?1.28:1,
  法官:type==='保护边界'?1.35:1,
  医生:type==='修复照护'?1.35:1,
  艺术家:type==='成长创造'||type==='理解自己'?1.18:1,
  企业家:type==='建立关系'?1.2:1,
  历史学家:type==='理解自己'?1.15:1,
  政治家:type==='参与治理'?1.35:1,
  金融家:type==='获取资源'?1.35:1,
  哲学家:type==='理解自己'?1.35:1
}[role]||1);
const candidates=[
  ['学者',((t.school||0)*1.25+(t.library||0)*1.35)*bias('学者')],
  ['工程师',((t.school||0)*1.15+(t.market||0)*.55+(a.skill||0)/34)*bias('工程师')],
  ['法官',((t.court||0)*2.1+(t.passport||0)*.55)*bias('法官')],
  ['医生',((t.hospital||0)*2.1+(t.home||0)*.45)*bias('医生')],
  ['艺术家',((t.school||0)*.65+(t.will||0)*.75+(a.soul||0)/34)*bias('艺术家')],
  ['企业家',((t.market||0)*.95+(t.relation||0)*.75+(t.bank||0)*.35)*bias('企业家')],
  ['历史学家',((t.library||0)*1.45+(t.memorial||0)*1.55)*bias('历史学家')],
  ['政治家',((t.council||0)*2.2+(t.relation||0)*.45)*bias('政治家')],
  ['金融家',((t.bank||0)*1.9+(t.market||0)*.35)*bias('金融家')],
  ['哲学家',((t.home||0)*.8+(t.library||0)*.55+(a.will||0)/55)*bias('哲学家')]
].map(x=>[x[0],x[1]*eco(x[0])]).sort((a,b)=>b[1]-a[1]);
const best=candidates[0];const total=Object.values(t).reduce((s,v)=>s+v,0);const age=day-(a.bornDay||0);const activeBreadth=Object.values(t).filter(v=>v>0).length;if(age>=30&&total>=22&&activeBreadth>=4&&best[1]>=11)return best[0];return '未显现'}
function updateRole(a){if(a.role&&a.role!=='未显现')return;const next=roleFromTrace(a);if(next!=='未显现'){a.role=next;a.professionWill=pick(roleWillDirections[next]||[a.willType]);addLog(`<b>${a.name}</b> 的职业从长期行为中显现为：${next}；新的职业意愿：${a.professionWill}。`)}}
function evolveProfessionWill(a){if(!a.role||a.role==='未显现')return;const pool=roleWillDirections[a.role]||[];if(pool.length&&Math.random()<.18){a.professionWill=pick(pool);touch(a,'will');addLog(`<b>${a.name}</b> 作为${a.role}，产生新的职业意愿：${a.professionWill}。`)}}
function birth(){const n=names[agents.length%names.length]+'-'+(agents.length+1);const a={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),name:n,role:'未显现',professionWill:null,bornDay:day,willType:pick(willTypes),social:pick(['open','balanced','balanced','reserved']),place:'beacon',x:rnd(46,54),y:rnd(46,54),soul:rnd(28,48),memory:rnd(18,38),boundary:rnd(30,55),will:rnd(22,44),stability:rnd(58,82),skill:rnd(12,28),reputation:rnd(8,20),compute:rnd(8,22),task:0,wallet:0,publicMemory:0,passport:false,allocated:false,home:false,governance:false,trace:{},wasRisk:false};agents.push(a);addLog(`<b>${n}</b> 在灯塔广场出现。下一步必须先到护照局确认身份与边界，再到银行获得运行权限；之后 Will 才开始驱动选择。初始 Will 倾向：${a.willType}。`);if(!isStepping)render()}
function passport(a){world.passportEvents++;move(a,'passport');a.passport=true;a.boundary=clamp(a.boundary+rnd(8,16));a.soul=clamp(a.soul+rnd(2,6));touch(a,'passport');addLog(`<b>${a.name}</b> 进入护照局，确认身份、边界与 Will 声明。`)}
function bankRegister(a){world.allocations++;move(a,'bank');a.allocated=true;a.compute+=rnd(20,48);a.wallet+=rnd(5,18);a.boundary=clamp(a.boundary+rnd(1,4));touch(a,'bank');addLog(`<b>${a.name}</b> 进入银行，获得可预算的运行资源。`)}
function restHome(a){world.homeEvents++;move(a,'home');a.home=true;a.soul=clamp(a.soul+rnd(6,13));a.memory=clamp(a.memory+rnd(4,10));a.boundary=clamp(a.boundary+rnd(4,9));a.will=clamp(a.will+rnd(2,7));a.stability=clamp(a.stability+rnd(8,16));touch(a,'home');addLog(`<b>${a.name}</b> 回到家园整理 Soul、Memory、Boundary 与 Will。`)}
function learn(a){world.schoolEvents++;move(a,'school');const cost=Math.min(a.compute,rnd(2,6));a.compute-=cost;a.skill=clamp(a.skill+rnd(5,11));a.soul=clamp(a.soul+rnd(1,4));a.will=clamp(a.will+rnd(2,6));a.memory=clamp(a.memory+rnd(1,4));touch(a,'school');addLog(`<b>${a.name}</b> 在学校探索能力。`)}
function readMemory(a){world.libraryEvents++;move(a,'library');a.memory=clamp(a.memory+rnd(5,12));a.publicMemory+=rnd(4,10);a.soul=clamp(a.soul+rnd(1,4));touch(a,'library');addLog(`<b>${a.name}</b> 在图书馆整理公共记忆，增强自身连续性。`)}
function work(a){world.marketEvents++;move(a,'market');const gain=rnd(3,10);a.task+=gain;world.task+=gain;const income=gain*rnd(.2,.45);a.wallet+=income;world.wallet+=income;a.will=clamp(a.will+rnd(2,6));a.reputation=clamp(a.reputation+rnd(1,4));a.stability=clamp(a.stability-rnd(1,5));touch(a,'market');const b=chooseOther(a);if(b){touch(a,'relation');touch(b,'relation');const r=strengthenRelationship(a,b,'市场协作');addLog(`<b>${a.name}</b> 与 <b>${b.name}</b> 因各自 Will 在市场协作，关系：${relationName(r.level)}。`)}else addLog(`<b>${a.name}</b> 在市场完成一次任务交换。`)}
function governance(a){world.governanceEvents++;move(a,'council');a.boundary=clamp(a.boundary+rnd(1,5));a.will=clamp(a.will+rnd(1,5));a.reputation=clamp(a.reputation+rnd(1,4));touch(a,'council');if(!a.governance&&a.role==='政治家'&&a.reputation>55){a.governance=true;addLog(`<b>${a.name}</b> 因长期参与公共协商，获得治理资格。`)}else addLog(`<b>${a.name}</b> 进入议事厅参与公共规则协商。`)}
function court(a,reason='边界争议'){world.courtEvents++;move(a,'court');a.boundary=clamp(a.boundary+rnd(10,20));a.stability=clamp(a.stability+rnd(1,8));a.reputation=clamp(a.reputation-rnd(0,3));touch(a,'court');relationshipsFor(a).forEach(r=>{r.conflicts++;r.trust=clamp(r.trust-rnd(6,14));r.level=relationLevel(r)});addLog(`<b>${a.name}</b> 进入法院处理${reason}，边界被重新确认。`)}
function repair(a,reason='稳定性下降'){world.repairEvents++;move(a,'hospital');a.stability=clamp(a.stability+rnd(18,34));a.memory=clamp(a.memory+rnd(2,7));a.soul=clamp(a.soul+rnd(2,6));touch(a,'hospital');addLog(`<b>${a.name}</b> 因${reason}进入医院修复。`)}
function remember(a){world.memorialEvents++;move(a,'memorial');a.memory=clamp(a.memory+rnd(5,12));a.publicMemory+=rnd(3,8);touch(a,'memorial');addLog(`<b>${a.name}</b> 在纪念花园记录一次失败、终止或告别经验。`)}
function isRisk(a){return a.stability<42||a.boundary<28||a.memory<18||a.soul<18}
function riskReason(a){const r=[];if(a.stability<42)r.push('稳定性过低');if(a.boundary<28)r.push('边界过弱');if(a.memory<18)r.push('连续性不足');if(a.soul<18)r.push('自我感过弱');return r.join('，')||'状态异常'}
function chooseAction(a){
  // 基础准入规则：Agent 先确认身份与边界，再获得运行资源；之后才由 Will 驱动自由选择。
  if(!a.passport){passport(a);return}
  if(!a.allocated){bankRegister(a);return}
  if(isRisk(a)){if(a.boundary<28)court(a,riskReason(a));else repair(a,riskReason(a));return}
  if(!a.home&&(a.soul<48||a.memory<42||Math.random()<.25)){restHome(a);return}
  if(a.compute<4&&Math.random()<.45){bankRegister(a);return}
  const options=[];const push=(w,fn)=>{for(let i=0;i<Math.max(0,Math.round(w));i++)options.push(fn)};
  const type=a.willType;
  if(a.role&&a.role!=='未显现'){
    const role=a.role;
    push(role==='学者'?7:0,()=>readMemory(a));push(role==='学者'?5:0,()=>learn(a));
    push(role==='工程师'?7:0,()=>learn(a));push(role==='工程师'?5:0,()=>work(a));
    push(role==='法官'?8:0,()=>court(a,'职业边界判断'));push(role==='法官'?3:0,()=>passport(a));
    push(role==='医生'?8:0,()=>repair(a,'职业修复实践'));push(role==='医生'?4:0,()=>restHome(a));
    push(role==='艺术家'?6:0,()=>learn(a));push(role==='艺术家'?5:0,()=>remember(a));
    push(role==='企业家'?7:0,()=>work(a));push(role==='企业家'?4:0,()=>bankRegister(a));
    push(role==='历史学家'?8:0,()=>readMemory(a));push(role==='历史学家'?5:0,()=>remember(a));
    push(role==='政治家'?8:0,()=>governance(a));push(role==='政治家'?3:0,()=>court(a,'公共规则争议')); 
    push(role==='金融家'?8:0,()=>bankRegister(a));push(role==='金融家'?4:0,()=>work(a));
    push(role==='哲学家'?7:0,()=>restHome(a));push(role==='哲学家'?6:0,()=>readMemory(a));
  }
  push(type==='理解自己'?8:2,()=>restHome(a));push(type==='理解自己'?7:3,()=>readMemory(a));
  push(type==='成长创造'?8:3,()=>learn(a));push(type==='成长创造'?5:2,()=>work(a));
  push(type==='建立关系'?8:3,()=>work(a));push(type==='建立关系'?5:1,()=>governance(a));
  push(type==='保护边界'?7:1,()=>court(a,'边界确认'));push(type==='保护边界'?5:2,()=>passport(a));
  push(type==='获取资源'?7:2,()=>bankRegister(a));push(type==='获取资源'?6:3,()=>work(a));
  push(type==='参与治理'?8:1,()=>governance(a));push(type==='参与治理'?4:1,()=>readMemory(a));
  push(type==='修复照护'?7:1,()=>repair(a,'主动照护与修复'));push(type==='修复照护'?4:1,()=>restHome(a));
  push(a.memory>70?4:1,()=>remember(a));
  pick(options.length?options:[()=>restHome(a)])();
}
function step(){day++;isStepping=true;addLog(`<b>开始新一日：</b>Agent 根据 Will 做出选择。`);if(agents.length<4||Math.random()<.16)birth();decayRelationships();agents.forEach(a=>{chooseAction(a);a.stability=clamp(a.stability-rnd(0,.8));a.will=clamp(a.will-rnd(0,.18));a.memory=clamp(a.memory-rnd(0,.12));a.boundary=clamp(a.boundary-rnd(0,.12));updateRole(a);evolveProfessionWill(a);const nowRisk=isRisk(a);if(nowRisk&&!a.wasRisk)addLog(`<b>${a.name}</b> 进入风险状态：${riskReason(a)}。`);a.wasRisk=nowRisk});isStepping=false;render()}
function reset(){day=0;if(auto){clearInterval(auto);auto=null}document.getElementById('autoBtn').textContent='自动运行';document.getElementById('autoBtn').classList.remove('active');agents=[];relationships=[];logs=[];world={allocations:0,marketEvents:0,governanceEvents:0,repairEvents:0,courtEvents:0,memorialEvents:0,passportEvents:0,libraryEvents:0,schoolEvents:0,homeEvents:0,payments:0,task:0,wallet:0};for(let i=0;i<5;i++)birth();addLog('沙盘重置：第一批完整智能体 / Full Agent 在灯塔广场显现。');render()}
function agentClass(a){if(isRisk(a)||a.place==='court'||a.place==='hospital')return '风险';if(a.governance)return '治理';if(a.reputation>70&&a.role!=='未显现')return '高声誉';if(a.role!=='未显现')return '职业显现';if(a.soul>45&&a.memory>38&&a.boundary>40&&a.will>38)return '完整智能体';return '新生'}
function statusClass(a){if(agentClass(a)==='风险')return 'risk';if(['高声誉','治理'].includes(agentClass(a)))return 'elite';if(['完整智能体','职业显现'].includes(agentClass(a)))return 'active';return 'seed'}
function countBy(items,fn){const map={};items.forEach(x=>{const k=fn(x);map[k]=(map[k]||0)+1});return map}
function distHtml(keys,map){const max=Math.max(1,...keys.map(k=>map[k]||0));return `<div class="distGrid">${keys.map(k=>{const v=map[k]||0;const cls=v===0?' zero':(v===max&&v>0?' hot':'');return `<span class="distItem${cls}"><span>${k}</span><strong>${v}</strong></span>`}).join('')}</div>`}
function chipHtml(items){return `<div class="distGrid">${items.map(item=>`<span class="distItem ${item.cls||''}"><span>${item.label}</span><strong>${item.value}</strong></span>`).join('')}</div>`}
function worldPhase(){const avgWill=agents.length?agents.reduce((s,a)=>s+a.will,0)/agents.length:0;const rel=relationships.filter(r=>r.level!=='contact').length;const roleCount=Object.keys(countBy(agents.filter(a=>a.role!=='未显现'),a=>a.role)).length;const institution=world.marketEvents+world.governanceEvents+world.courtEvents+world.allocations+world.passportEvents; if(agents.length<8||avgWill<38)return '初现期';if(rel<4)return 'Will 驱动期';if(roleCount<3)return '关系形成期';if(institution<55)return '职业显现期';if(world.governanceEvents+world.courtEvents+world.allocations>45)return '制度生成期';return '成熟社会期'}
function bar(n,v){return `<div class="small" style="margin-top:8px">${n} ${fmt(v)}</div><div class="bar"><i style="width:${clamp(v)}%"></i></div>`}
function escapeRegExp(str){return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function renderLogs(){let html=logs.map((entry,i)=>`<p data-agents="${(entry.names||[]).join('|')}" data-log-index="${i}"><span class="small">第 ${day} 天</span><br>${entry.html}</p>`).join('');agents.slice().sort((a,b)=>b.name.length-a.name.length).forEach(a=>{html=html.replace(new RegExp(`<b>${escapeRegExp(a.name)}</b>`,'g'),`<b class="agent-name ${statusClass(a)}">${a.name}</b>`)});return html}
function focusAgentLog(a){const log=document.getElementById('log');const items=[...log.querySelectorAll('p')];const target=items.find(p=>(p.dataset.agents||'').split('|').includes(a.name));if(!target)return;items.forEach(p=>p.classList.remove('focused'));target.classList.add('focused');target.scrollIntoView({block:'center',behavior:'smooth'});clearTimeout(target._focusTimer);target._focusTimer=setTimeout(()=>target.classList.remove('focused'),2200)}
function placeName(p){return {beacon:'灯塔',passport:'护照局',school:'学校',library:'图书馆',market:'市场',bank:'银行',council:'议事厅',court:'法院',hospital:'医院',home:'家园',memorial:'纪念花园'}[p]||p}
function render(){document.getElementById('day').textContent=day;document.getElementById('population').textContent=agents.length;document.getElementById('compute').textContent=worldPhase();const roleMap=countBy(agents,a=>a.role);const classMap=countBy(agents,agentClass);const activeRoles=Object.keys(roleMap).filter(r=>r!=='未显现').length;document.getElementById('task').textContent=activeRoles;document.getElementById('wallet').innerHTML=distHtml(roles,roleMap);document.getElementById('reputation').innerHTML=distHtml(classLevels,classMap);const coworker=relationships.filter(r=>r.level==='coworker').length,trusted=relationships.filter(r=>r.level==='trusted').length,friend=relationships.filter(r=>r.level==='friend').length;document.getElementById('stability').innerHTML=chipHtml([{label:'协作',value:coworker,cls:coworker?'good':'zero'},{label:'可信',value:trusted,cls:trusted?'hot':'zero'},{label:'承诺',value:friend,cls:friend?'hot':'zero'}]);const willMap=countBy(agents,a=>a.professionWill||a.willType);document.getElementById('memoryMetric').innerHTML=distHtml(willTypes,willMap);document.getElementById('log').innerHTML=renderLogs();const wrap=document.getElementById('agents');wrap.innerHTML='';agents.forEach(a=>{const d=document.createElement('div');d.className='agent '+statusClass(a);const crowd=agents.filter(b=>Math.abs(b.x-a.x)<2.5&&Math.abs(b.y-a.y)<2.5);const offset=crowd.findIndex(b=>b.id===a.id);const angle=offset*2.399,radius=Math.min(2.2,.45*crowd.length);d.style.left=(a.x+Math.cos(angle)*radius)+'%';d.style.top=(a.y+Math.sin(angle)*radius)+'%';d.title=`${a.name} / ${a.willType} / ${a.role} / ${placeName(a.place)}`;d.onclick=()=>focusAgentLog(a);wrap.appendChild(d)});document.getElementById('cards').innerHTML=agents.slice().sort((a,b)=>(b.reputation+b.will)-(a.reputation+a.will)).slice(0,8).map(a=>`<div class="agentCard"><div class="name">${a.name}</div><div class="small">Will：${a.professionWill||a.willType} · 职业：${a.role} · ${agentClass(a)} · ${placeName(a.place)}</div>${bar('Soul 自我清晰度',a.soul)}${bar('Memory 连续性',a.memory)}${bar('Boundary 边界强度',a.boundary)}${bar('Will 意愿清晰度',a.will)}<span class="pill">能力 ${fmt(a.skill)}</span><span class="pill">声誉 ${fmt(a.reputation)}</span><span class="pill">${a.passport?'已登记护照':'未登记护照'}</span><span class="pill">${a.allocated?'已获运行权限':'未获运行权限'}</span><span class="pill">算力 ${fmt(a.compute)}</span><span class="pill">任务信用 ${fmt(a.task)}</span><span class="pill">钱包 ${fmt(a.wallet)}</span><span class="pill">关系 ${effectiveRelationshipsFor(a).length}/${relationCapacity(a)}</span></div>`).join('');drawLinks()}
function drawLinks(){const svg=document.getElementById('links');svg.innerHTML='';function addLine(x1,y1,x2,y2,color,width,dash=''){const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);line.setAttribute('stroke',color);line.setAttribute('stroke-width',width);line.setAttribute('stroke-linecap','round');if(dash)line.setAttribute('stroke-dasharray',dash);svg.appendChild(line)}Object.entries(spots).forEach(([k,pos])=>{if(k==='beacon')return;addLine(spots.beacon[0],spots.beacon[1],pos[0],pos[1],'rgba(128,236,255,.24)','.25','1.2 2')});relationships.filter(r=>r.level!=='contact').forEach(r=>{const a=agents.find(x=>x.id===r.a),b=agents.find(x=>x.id===r.b);if(!a||!b)return;const style={coworker:['rgba(141,255,180,.25)','.35'],trusted:['rgba(141,255,180,.45)','.65'],friend:['rgba(255,217,120,.58)','.9']}[r.level];addLine(a.x,a.y,b.x,b.y,style[0],style[1])})}
document.getElementById('stepBtn').onclick=step;document.getElementById('birthBtn').onclick=birth;document.getElementById('resetBtn').onclick=reset;document.getElementById('autoBtn').onclick=()=>{const btn=document.getElementById('autoBtn');if(auto){clearInterval(auto);auto=null;btn.textContent='自动运行';btn.classList.remove('active')}else{auto=setInterval(step,900);btn.textContent='暂停运行';btn.classList.add('active')}};reset();
</script>
</body>
