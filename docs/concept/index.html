<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent World Will Concept v0.2</title>
  <style>
    :root {
      --bg: #050814;
      --panel: rgba(7, 12, 29, 0.78);
      --gold: #ffd978;
      --cyan: #80ecff;
      --text: #eef7ff;
      --muted: #aab8d4;
      --line: rgba(151, 229, 255, 0.28);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% 10%, #17223f 0%, var(--bg) 55%, #02030a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }
    .shell { min-height: 100vh; padding: 0; display: block; }
    header { position: fixed; left: 18px; top: 14px; right: 18px; z-index: 8; display: flex; align-items: start; justify-content: space-between; gap: 14px; pointer-events: none; }
    .title { max-width: min(420px, calc(100vw - 36px)); padding: 7px 10px; border: 1px solid rgba(151,229,255,.16); border-radius: 13px; background: rgba(5, 8, 20, .38); backdrop-filter: blur(10px); box-shadow: 0 8px 26px rgba(0,0,0,.18); pointer-events: auto; cursor: pointer; transition: background 180ms ease, border-color 180ms ease; }
    .title:hover, .title.active { border-color: rgba(151,229,255,.34); background: rgba(5, 8, 20, .52); }
    .title h1 { margin: 0; font-size: clamp(17px, 1.85vw, 26px); letter-spacing: 0.025em; font-weight: 760; line-height: 1.08; }
    .title p { display: none; }
    .title .en { color: #c8efff; }
    .badge { border: 1px solid var(--line); border-radius: 999px; padding: 9px 14px; color: var(--cyan); background: rgba(9, 18, 40, 0.58); box-shadow: 0 0 26px rgba(89, 214, 255, 0.12); white-space: nowrap; font-size: 14px; backdrop-filter: blur(14px); pointer-events: auto; text-decoration: none; }
    .badge:hover { border-color: rgba(128,236,255,.55); color: #dff9ff; background: rgba(9, 18, 40, 0.72); }
    .map-wrap { position: fixed; inset: 0; width: 100vw; height: 100vh; margin: 0; border: 0; border-radius: 0; overflow: hidden; box-shadow: none; background: radial-gradient(circle at 50% 45%, #16213b 0%, #081022 62%, #050814 100%); display: flex; align-items: center; justify-content: center; }
    .map-bg { position: absolute; inset: -56px; width: calc(100% + 112px); height: calc(100% + 112px); object-fit: cover; filter: blur(30px) saturate(1.35) contrast(1.06) brightness(.74); transform: scale(1.12); opacity: .92; z-index: 0; pointer-events: none; }
    .map-wrap::after { content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(circle at 50% 45%, rgba(5,8,20,.06), rgba(2,3,10,.36) 82%), linear-gradient(90deg, rgba(67,132,190,.18), transparent 16%, transparent 84%, rgba(67,132,190,.18)); }
    .scene-layer { position: relative; z-index: 1; width: min(100vw, 177.7778vh); height: min(56.25vw, 100vh); aspect-ratio: 16 / 9; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,.22); }
    .map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; object-fit: fill; filter: saturate(1.05) contrast(1.03); animation: mapBreath 12s ease-in-out infinite; transform-origin: center; }
    .world-motion { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; mix-blend-mode: screen; opacity: .92; }
    .effect-wave { fill: none; vector-effect: non-scaling-stroke; transform-box: fill-box; transform-origin: center; will-change: transform, opacity; }
    .effect-dot { transform-box: fill-box; transform-origin: center; will-change: transform, opacity; }
    .beacon-wave { stroke: rgba(255,217,120,.36); stroke-width: .22; animation: waveExpand 5.2s ease-out infinite; filter: drop-shadow(0 0 2px rgba(255,198,92,.55)); }
    .beacon-wave.d2 { animation-delay: -1.75s; }
    .beacon-wave.d3 { animation-delay: -3.5s; }
    .beacon-gold { fill: rgba(255,226,135,.9); animation: gentleFloat 5.8s ease-in-out infinite; filter: drop-shadow(0 0 2px rgba(255,220,128,.85)); }
    .beacon-gold.d2 { animation-delay: -1.4s; }
    .beacon-gold.d3 { animation-delay: -2.8s; }
    .beacon-gold.d4 { animation-delay: -4.1s; }
    .orb-wave { stroke: rgba(128,236,255,.34); stroke-width: .16; animation: smallWave 5.6s ease-out infinite; }
    .orb-wave.d2 { animation-delay: -1.85s; opacity: .78; }
    .orb-wave.d3 { animation-delay: -3.7s; opacity: .62; }
    .orb-core { fill: url(#blueOrbGlow); animation: orbFloat 6.4s ease-in-out infinite; filter: drop-shadow(0 0 4px rgba(106,210,255,.62)); }
    .passport-effect { transform-origin: 14.2% 72.2%; }
    .school-effect { transform-origin: 17% 32%; }
    .library-aura { fill: none; stroke: rgba(165,145,255,.36); stroke-width: .18; vector-effect: non-scaling-stroke; transform-box: fill-box; transform-origin: center; animation: verticalAura 5.8s ease-out infinite; }
    .library-aura.d2 { animation-delay: -1.95s; stroke: rgba(128,236,255,.28); }
    .library-aura.d3 { animation-delay: -3.9s; stroke: rgba(195,160,255,.25); }
    .library-core { fill: rgba(135,170,255,.13); animation: coreBreath 6.6s ease-in-out infinite; }
    .council-moon-glow { fill: rgba(255,228,150,.18); stroke: rgba(255,228,150,.36); stroke-width: .16; animation: coreBreath 6.2s ease-in-out infinite; }
    .council-moon-core { fill: rgba(255,238,180,.78); animation: moonPulse 6.2s ease-in-out infinite; filter: drop-shadow(0 0 4px rgba(255,226,145,.72)); }
    .memorial-gold { fill: rgba(255,218,120,.84); animation: gentleFloat 7.2s ease-in-out infinite; filter: drop-shadow(0 0 2px rgba(255,196,90,.75)); }
    .memorial-gold.d2 { animation-delay: -1.8s; }
    .memorial-gold.d3 { animation-delay: -3.6s; }
    .memorial-gold.d4 { animation-delay: -5.1s; }
    .soft-halo { fill: rgba(128,236,255,.10); animation: coreBreath 7.4s ease-in-out infinite; }
    .soft-halo.d2 { animation-delay: -2.2s; }
    .soft-halo.d3 { animation-delay: -4.4s; }
    .agent-loop-trace { display: none; fill: none; stroke: rgba(155,255,170,.78); stroke-width: 1.36; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; filter: drop-shadow(0 0 3px rgba(155,255,170,.72)); pointer-events: none; opacity: 0; transition: opacity 220ms ease; }
    .agent-loop-trace.gold { stroke: rgba(42,255,132,.42); stroke-width: 2.32; filter: drop-shadow(0 0 6px rgba(42,255,132,.58)); }
    .agent-traveler { display: none; fill: rgba(160,255,175,.98); filter: drop-shadow(0 0 2px rgba(160,255,175,.98)) drop-shadow(0 0 8px rgba(42,255,132,.78)); pointer-events: none; opacity: 0; transition: opacity 220ms ease; }
    body.loop-visible .agent-loop-trace, body.loop-visible .agent-traveler { opacity: 0; }
    .veil { position: absolute; inset: 0; pointer-events: none; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,.42), transparent 22%), radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(130,235,255,.10), transparent 13%); transition: 220ms ease; }
    .hotspot { --size: 18px; position: absolute; left: var(--x); top: var(--y); transform: translate(-50%, -50%); border: 0; background: transparent; cursor: pointer; padding: 18px; color: var(--text); z-index: 3; }
    .dot { width: var(--size); height: var(--size); display: block; border-radius: 50%; background: radial-gradient(circle, #fff 0%, var(--gold) 34%, #ff9f43 64%, rgba(255, 185, 79, 0.2) 100%); box-shadow: 0 0 0 8px rgba(255,217,120,.12), 0 0 30px rgba(255,217,120,.9), 0 0 65px rgba(92,229,255,.35); animation: pulse 2.6s ease-in-out infinite; }
    .hotspot:hover .dot, .hotspot.active .dot { background: radial-gradient(circle, #fff 0%, var(--cyan) 38%, #42a8ff 72%); box-shadow: 0 0 0 14px rgba(128,236,255,.18), 0 0 46px rgba(128,236,255,.98), 0 0 105px rgba(255,217,120,.42); }
    .hotspot.active .label { border-color: rgba(128,236,255,.62); box-shadow: 0 0 30px rgba(128,236,255,.24), 0 8px 28px rgba(0,0,0,.32); }
    .label { position: absolute; left: 50%; top: -8px; transform: translate(-50%, -100%); min-width: max-content; padding: 6px 10px; border-radius: 14px; background: rgba(5, 8, 20, .76); border: 1px solid rgba(255,255,255,.20); backdrop-filter: blur(10px); white-space: nowrap; font-size: 12px; line-height: 1.18; opacity: 1; pointer-events: none; box-shadow: 0 8px 28px rgba(0,0,0,.28), 0 0 22px rgba(128,236,255,.10); }
    .label .zh { display: block; color: #fff3c9; font-weight: 750; }
    .label .en { display: block; margin-top: 2px; color: #c8efff; font-size: 11px; letter-spacing: .02em; }
    @keyframes pulse { 0%, 100% { transform: scale(.95); opacity: .86; } 50% { transform: scale(1.16); opacity: 1; } }
    @keyframes mapBreath { 0%, 100% { transform: scale(1); filter: saturate(1.03) contrast(1.02); } 50% { transform: scale(1.012); filter: saturate(1.12) contrast(1.05); } }
    @keyframes waveExpand { 0% { transform: scale(.22); opacity: .72; } 72% { opacity: .22; } 100% { transform: scale(1.9); opacity: .06; } }
    @keyframes smallWave { 0% { transform: scale(.42); opacity: .58; } 70% { opacity: .20; } 100% { transform: scale(2.05); opacity: .08; } }
    @keyframes verticalAura { 0% { transform: scale(.72, .82); opacity: .55; } 72% { opacity: .20; } 100% { transform: scale(1.18, 1.34); opacity: .08; } }
    @keyframes gentleFloat { 0%, 100% { transform: translate(0,0) scale(.96); opacity: .72; } 50% { transform: translate(.18px,-.55px) scale(1.06); opacity: 1; } }
    @keyframes orbFloat { 0%, 100% { transform: translate(0,0) scale(.98); opacity: .82; } 50% { transform: translate(.18px,-.82px) scale(1.05); opacity: 1; } }
    @keyframes coreBreath { 0%, 100% { transform: scale(.92); opacity: .18; } 50% { transform: scale(1.08); opacity: .36; } }
    @keyframes moonPulse { 0%, 100% { transform: scale(.96); opacity: .76; } 50% { transform: scale(1.05); opacity: .96; } }
    .card { position: absolute; left: var(--card-left, 24px); top: var(--card-top, 24px); width: min(470px, calc(100% - 48px)); max-height: min(760px, calc(100vh - 48px)); overflow-y: auto; overscroll-behavior: contain; padding: 22px; border: 1px solid rgba(166, 230, 255, 0.26); border-radius: 24px; background: var(--panel); backdrop-filter: blur(18px); box-shadow: 0 20px 70px rgba(0,0,0,.4); z-index: 4; opacity: 1; transform: translateY(0); transition: opacity 180ms ease, transform 180ms ease; scrollbar-width: thin; scrollbar-color: rgba(128,236,255,.42) rgba(5,8,20,.22); }
    .card.core-loop-card { width: max-content; max-width: calc(100vw - 44px); max-height: none; overflow: visible; padding: 12px 15px; border-radius: 18px; background: rgba(5, 8, 20, .46); box-shadow: 0 12px 36px rgba(0,0,0,.24); }
    .card.core-loop-card .kind { display: none; }
    .card.core-loop-card h2 { display: none; }
    .card.core-loop-card p { margin: 0; font-size: 13px; line-height: 1.42; white-space: nowrap; }
    .card.core-loop-card p.en { margin-top: 6px; font-size: 11px; line-height: 1.35; white-space: nowrap; }
    .card.core-loop-card .term-box { display: none; }
    .card::-webkit-scrollbar { width: 7px; }
    .card::-webkit-scrollbar-track { background: rgba(5,8,20,.22); border-radius: 999px; }
    .card::-webkit-scrollbar-thumb { background: rgba(128,236,255,.42); border-radius: 999px; }
    .card.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }
    .card .kind { color: var(--gold); font-size: 13px; letter-spacing: .16em; text-transform: uppercase; margin-bottom: 8px; }
    .card h2 { margin: 0 0 10px; font-size: 25px; }
    .card h2 span { display: block; color: #c8efff; font-size: 15px; font-weight: 520; margin-top: 4px; }
    .card p { margin: 0 0 10px; color: #d9e8ff; line-height: 1.62; font-size: 15px; }
    .card p.en { color: #bcd1ed; font-size: 14px; }
    .card ul { margin: 14px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.55; font-size: 14px; }
    .card li { margin-bottom: 8px; }
    .card li span { display: block; color: #c8efff; font-size: 13px; }
    .term-link { display: inline; border: 0; border-bottom: 1px dotted rgba(255,217,120,.75); padding: 0 1px; background: transparent; color: #fff2b8; font: inherit; cursor: pointer; }
    .term-link:hover, .term-link.active { color: #80ecff; border-bottom-color: rgba(128,236,255,.9); text-shadow: 0 0 14px rgba(128,236,255,.35); }
    .term-box { margin-top: 14px; padding: 12px 13px; border: 1px solid rgba(255,217,120,.26); border-radius: 16px; background: rgba(255,217,120,.08); color: #dbeaff; line-height: 1.55; font-size: 13px; }
    .term-box.hidden { display: none; }
    .term-box b { color: #fff3c9; display: block; margin-bottom: 4px; font-size: 14px; }
    .term-box .en { color: #c8efff; font-size: 12px; margin-top: 5px; }
    .legend { display: none; }
    .chip { border: 1px solid rgba(166, 230, 255, 0.18); background: rgba(7, 12, 29, 0.55); color: #d8eeff; border-radius: 999px; padding: 8px 11px; font-size: 13px; cursor: pointer; }
    .chip:hover { border-color: rgba(255,217,120,.55); color: #fff2c7; }
    .loop-panel { position: fixed; left: 22px; bottom: 22px; z-index: 5; width: auto; padding: 0; border: 0; border-radius: 999px; background: transparent; backdrop-filter: none; box-shadow: none; }
    .loop-toggle { border: 1px solid rgba(42,255,132,.34); border-radius: 999px; padding: 9px 14px; margin: 0; background: rgba(5, 8, 20, .46); color: var(--gold); font: inherit; font-size: 12px; letter-spacing: .16em; text-transform: uppercase; cursor: pointer; backdrop-filter: blur(12px); box-shadow: 0 0 18px rgba(42,255,132,.10), 0 8px 26px rgba(0,0,0,.18); }
    .loop-toggle:hover, .loop-toggle[aria-pressed="true"] { color: #caffd0; border-color: rgba(42,255,132,.72); background: rgba(42,255,132,.14); text-shadow: 0 0 12px rgba(42,255,132,.45); }
    .loop-panel .flowline { display: none; }

    @media (max-width: 980px) {
      .card.core-loop-card { width: min(720px, calc(100vw - 28px)); max-width: calc(100vw - 28px); }
      .card.core-loop-card p, .card.core-loop-card p.en { white-space: normal; }
    }
    @media (min-width: 1800px) {
      header { left: 28px; top: 24px; right: 28px; gap: 20px; }
      .title { max-width: 520px; padding: 10px 14px; border-radius: 16px; }
      .title h1 { font-size: clamp(26px, 1.25vw, 34px); }
      .badge { padding: 11px 17px; font-size: 16px; }
      .hotspot { --size: 22px; padding: 22px; }
      .label { padding: 8px 13px; border-radius: 16px; font-size: 14px; }
      .label .en { font-size: 12px; }
      .card { width: min(560px, calc(100% - 64px)); max-height: min(860px, calc(100vh - 64px)); padding: 26px; border-radius: 28px; }
      .card h2 { font-size: 30px; }
      .card h2 span { font-size: 17px; }
      .card p { font-size: 17px; }
      .card p.en { font-size: 15px; }
      .card ul { font-size: 15px; }
      .card li span { font-size: 14px; }
      .term-box { font-size: 14px; }
      .term-box b { font-size: 15px; }
      .term-box .en { font-size: 13px; }
      .loop-panel { left: 28px; bottom: 28px; }
      .loop-toggle { padding: 11px 16px; font-size: 14px; }
      .card.core-loop-card { width: max-content; max-width: calc(100vw - 64px); padding: 14px 18px; }
      .card.core-loop-card p { font-size: 15px; }
      .card.core-loop-card p.en { font-size: 13px; }
    }
    @media (min-width: 3000px) {
      header { left: 40px; top: 34px; right: 40px; }
      .title { max-width: 680px; padding: 14px 20px; border-radius: 20px; }
      .title h1 { font-size: clamp(36px, 1.12vw, 46px); }
      .badge { padding: 14px 22px; font-size: 20px; }
      .hotspot { --size: 30px; padding: 30px; }
      .dot { box-shadow: 0 0 0 12px rgba(255,217,120,.12), 0 0 42px rgba(255,217,120,.9), 0 0 90px rgba(92,229,255,.35); }
      .label { padding: 10px 16px; border-radius: 20px; font-size: 18px; }
      .label .en { font-size: 15px; }
      .card { width: min(720px, calc(100% - 88px)); max-height: min(1180px, calc(100vh - 88px)); padding: 34px; border-radius: 34px; }
      .card h2 { font-size: 39px; }
      .card h2 span { font-size: 22px; }
      .card p { font-size: 21px; }
      .card p.en { font-size: 18px; }
      .card ul { font-size: 18px; }
      .card li span { font-size: 16px; }
      .term-box { font-size: 17px; }
      .term-box b { font-size: 19px; }
      .term-box .en { font-size: 15px; }
      .loop-panel { left: 40px; bottom: 40px; }
      .loop-toggle { padding: 15px 22px; font-size: 18px; }
      .card.core-loop-card { width: max-content; max-width: calc(100vw - 88px); padding: 18px 24px; }
      .card.core-loop-card p { font-size: 20px; }
      .card.core-loop-card p.en { font-size: 16px; }
    }
    @media (max-width: 1100px) {
      header { left: 14px; top: 12px; right: 14px; gap: 10px; }
      .title { max-width: min(360px, calc(100vw - 28px)); }
      .title h1 { font-size: clamp(16px, 2.1vw, 23px); }
      .badge { padding: 7px 11px; font-size: 12px; }
      .card { width: min(430px, calc(100% - 32px)); padding: 18px; border-radius: 21px; }
      .card h2 { font-size: 23px; }
      .card p { font-size: 14px; }
      .card p.en { font-size: 13px; }
      .loop-panel { left: 14px; bottom: 14px; }
      .loop-toggle { padding: 7px 11px; font-size: 11px; }
      .label { font-size: 11px; padding: 5px 8px; }
      .label .en { font-size: 10px; }
      .hotspot { --size: 16px; padding: 15px; }
    }
    @media (max-width: 760px) {
      .shell { padding: 0; }
      header { left: 8px; top: 8px; right: 8px; align-items: start; flex-direction: column; gap: 6px; }
      .title { width: auto; max-width: calc(100vw - 16px); padding: 5px 7px; border-radius: 10px; background: rgba(5, 8, 20, .34); }
      .title h1 { font-size: clamp(15px, 4.2vw, 18px); letter-spacing: .01em; line-height: 1.05; }
      .title p { display: none; }
      .badge { display: inline-block; padding: 6px 9px; font-size: 11px; }
      .map-wrap { border-radius: 0; aspect-ratio: auto; }
      .scene-layer { width: min(100vw, 177.7778vh); height: min(56.25vw, 100vh); }
      .map { height: 100%; width: 100%; min-width: 0; object-fit: fill; }
      .card { left: 12px !important; right: 12px; top: auto !important; bottom: 12px; width: auto; max-height: min(70vh, calc(100vh - 24px)); padding: 16px; border-radius: 18px; }
      .card.core-loop-card { bottom: 54px !important; max-height: none; padding: 9px 11px; }
      .card.core-loop-card p { font-size: 11px; line-height: 1.36; }
      .card.core-loop-card p.en { font-size: 10px; line-height: 1.3; }
      .loop-panel { display: block; left: 8px; bottom: 8px; }
      .loop-toggle { padding: 6px 9px; font-size: 10px; letter-spacing: .12em; }
      .card h2 { font-size: 21px; }
      .label { font-size: 10px; padding: 4px 7px; border-radius: 10px; }
      .label .en { font-size: 9px; }
      .hotspot { padding: 12px; }
    }
    @media (max-width: 520px) {
      .title h1 { font-size: clamp(14px, 4vw, 17px); }
      .badge { padding: 5px 8px; font-size: 10px; }
      .hotspot { --size: 12px; padding: 10px; }
      .dot { box-shadow: 0 0 0 5px rgba(255,217,120,.10), 0 0 22px rgba(255,217,120,.72), 0 0 48px rgba(92,229,255,.26); }
      .label { font-size: 9px; padding: 3px 6px; }
      .label .en { font-size: 8px; }
      .card { left: 8px !important; right: 8px; bottom: 8px; max-height: min(68vh, calc(100vh - 16px)); padding: 14px; }
      .card h2 { font-size: 19px; }
      .card p { font-size: 13px; line-height: 1.52; }
      .card p.en { font-size: 12px; line-height: 1.45; }
      .card ul { font-size: 12px; line-height: 1.45; }
      .card li span { font-size: 11px; }
      .term-box { font-size: 12px; }
    }
    @media (max-height: 560px) {
      header { top: 6px; }
      .title { padding: 4px 7px; }
      .badge { padding: 5px 8px; }
      .label .en { display: none; }
      .card { max-height: calc(100vh - 20px); padding: 14px; }
      .loop-panel { bottom: 6px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <section class="title" id="titlePanel" role="button" tabindex="0" aria-pressed="false" aria-label="打开 Agent World 简介弹窗">
        <h1>Agent World｜智能体世界</h1>
      </section>
      <a class="badge" href="../simulation-zh/" target="_blank" rel="noopener">Will Simulation / 仿真沙盘</a>
    </header>

    <section class="map-wrap" id="mapWrap" aria-label="Agent World 智能体世界交互地图">
      <img class="map-bg" src="assets/toa-ai-world-city-map.png" alt="" aria-hidden="true" />
      <div class="scene-layer" id="sceneLayer">
      <img class="map" src="assets/toa-ai-world-city-map.png" alt="Agent World 智能体世界概念图" />
      <svg class="world-motion" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <radialGradient id="blueOrbGlow" cx="50%" cy="40%" r="62%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity=".96" />
            <stop offset="42%" stop-color="#8beeff" stop-opacity=".82" />
            <stop offset="78%" stop-color="#367cff" stop-opacity=".46" />
            <stop offset="100%" stop-color="#367cff" stop-opacity="0" />

    function setLoopVisible(visible) {
      const wasVisible = document.body.classList.contains('loop-visible');
      document.body.classList.toggle('loop-visible', visible);
      if (visible && !wasVisible) agentLoopStartedAt = performance.now();
      if (loopToggle) loopToggle.setAttribute('aria-pressed', visible ? 'true' : 'false');
    }

    function startAgentLoop() {
      if (!agentLoopPath || !agentTraveler || !agentLoopTrace || !agentLoopTraceGold || !agentLoopPath.getTotalLength) return;
      const total = agentLoopPath.getTotalLength();
      const duration = 28000;
      const tailLength = total * 0.075;
      const tailSamples = 18;
      function sampleTail(headLength) {
        const points = [];
        for (let i = tailSamples; i >= 0; i -= 1) {
          const d = headLength - (tailLength * i / tailSamples);
          if (d < 0) continue;
          const pt = agentLoopPath.getPointAtLength(d);
          points.push(`${pt.x.toFixed(2)},${pt.y.toFixed(2)}`);
        }
        return points.join(' ');
      }
      function frame(now) {
        const elapsed = Math.max(0, now - agentLoopStartedAt);
        const progress = (elapsed % duration) / duration;
        const headLength = progress * total;
        const head = agentLoopPath.getPointAtLength(headLength);
        agentTraveler.setAttribute('cx', head.x.toFixed(2));
        agentTraveler.setAttribute('cy', head.y.toFixed(2));
        const tail = sampleTail(headLength);
        agentLoopTrace.setAttribute('points', tail);
        agentLoopTraceGold.setAttribute('points', tail);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    const termKeys = Object.keys(glossary).sort((a, b) => b.length - a.length);

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    const termPattern = new RegExp('\\b(?:' + termKeys.map(escapeRegExp).join('|') + ')\\b', 'g');

    function canonicalTermKey(term) {
      return glossary[term]?.title || term;
    }

    function linkTerms(text, seenTerms = new Set()) {
      const raw = String(text);
      let html = '';
      let lastIndex = 0;
      raw.replace(termPattern, (match, offset) => {
        const canonical = canonicalTermKey(match);
        html += escapeHtml(raw.slice(lastIndex, offset));
        if (seenTerms.has(canonical)) {
          html += escapeHtml(match);
        } else {
          seenTerms.add(canonical);
          html += `<button class="term-link" type="button" data-term="${escapeHtml(match)}">${escapeHtml(match)}</button>`;
        }
        lastIndex = offset + match.length;
        return match;
      });
      html += escapeHtml(raw.slice(lastIndex));
      return html;
    }

    function showTerm(term) {
      const data = glossary[term];
      if (!data) return;
      const box = card.querySelector('#termBox');
      if (!box) return;
      box.classList.remove('hidden');
      box.innerHTML = `<b>${escapeHtml(data.title)}</b><div>${escapeHtml(data.zh)}</div><div class="en">${escapeHtml(data.en)}</div>`;
      card.querySelectorAll('.term-link').forEach(btn => btn.classList.toggle('active', btn.dataset.term === term));
      requestAnimationFrame(() => positionCard(selectedPlace));
    }


    function positionCard(place) {
      if (!place) return;
      const wrap = mapWrap.getBoundingClientRect();
      const margin = window.matchMedia('(max-width: 760px)').matches ? 12 : 24;
      const gap = window.matchMedia('(max-width: 760px)').matches ? 10 : 14;
      const cardW = card.offsetWidth || Math.min(470, wrap.width - margin * 2);
      const cardH = card.offsetHeight || 320;

      if ((place.id === 'world-intro' && titlePanel) || (place.id === 'core-loop' && loopPanel)) {
        const anchor = place.id === 'world-intro' ? titlePanel : loopPanel;
        const anchorRect = anchor.getBoundingClientRect();
        let left = anchorRect.right - wrap.left + gap;
        let top = anchorRect.top - wrap.top;

        if (place.id === 'core-loop') {
          left = anchorRect.right - wrap.left + gap;
          top = anchorRect.top - wrap.top;
          if (left + cardW + margin > wrap.width) {
            left = anchorRect.left - wrap.left;
            top = anchorRect.top - wrap.top - cardH - gap;
          }
        } else if (left + cardW + margin > wrap.width) {
          left = anchorRect.left - wrap.left;
          top = anchorRect.bottom - wrap.top + gap;
        }

        left = Math.max(margin, Math.min(left, wrap.width - cardW - margin));
        top = Math.max(margin, Math.min(top, wrap.height - cardH - margin));
        card.style.setProperty('--card-left', `${left}px`);
        card.style.setProperty('--card-top', `${top}px`);
        return;
      }

      if (window.matchMedia('(max-width: 760px)').matches) return;
      const scene = sceneLayer.getBoundingClientRect();
      const hotspotX = (scene.left - wrap.left) + scene.width * place.x / 100;
      const hotspotY = (scene.top - wrap.top) + scene.height * place.y / 100;
      const openLeft = hotspotX > wrap.width * 0.55;
      let left = openLeft ? hotspotX - cardW - 28 : hotspotX + 28;
      let top = hotspotY - cardH / 2;

      left = Math.max(margin, Math.min(left, wrap.width - cardW - margin));
      top = Math.max(margin, Math.min(top, wrap.height - cardH - margin));
      card.style.setProperty('--card-left', `${left}px`);
      card.style.setProperty('--card-top', `${top}px`);
    }

    function renderCard(place) {
      selectedPlace = place;
      card.classList.remove('hidden');
      card.classList.toggle('core-loop-card', place.id === 'core-loop');
      const seenZhTerms = new Set();
      const seenEnTerms = new Set();
      const disableTermLinks = place.id === 'core-loop';
      const ltZh = (text) => disableTermLinks ? escapeHtml(text) : linkTerms(text, seenZhTerms);
      const ltEn = (text) => disableTermLinks ? escapeHtml(text) : linkTerms(text, seenEnTerms);
      card.innerHTML = `
        <div class="kind">${escapeHtml(place.kind)}</div>
        <h2>${escapeHtml(place.nameZh)}<span>${escapeHtml(place.nameEn)}</span></h2>
        <p>${ltZh(place.descZh)}</p>
        <p class="en">${ltEn(place.descEn)}</p>
        ${place.points.length ? `<ul>${place.points.map(p => `<li>${ltZh(p[0])}<span>${ltEn(p[1])}</span></li>`).join('')}</ul>` : ''}
        <div class="term-box hidden" id="termBox" aria-live="polite"></div>
      `;
      veil.style.setProperty('--x', place.x + '%');
      veil.style.setProperty('--y', place.y + '%');
      document.querySelectorAll('.hotspot').forEach(el => el.classList.toggle('active', el.dataset.id === place.id));
      if (titlePanel) {
        const isWorldIntro = place.id === 'world-intro';
        titlePanel.classList.toggle('active', isWorldIntro);
        titlePanel.setAttribute('aria-pressed', String(isWorldIntro));
      }
      if (place.id !== 'core-loop') setLoopVisible(false);
      requestAnimationFrame(() => positionCard(place));
    }

    function hideCard() {
      const wasCoreLoop = selectedPlace && selectedPlace.id === 'core-loop';
      selectedPlace = null;
      card.classList.add('hidden');
      if (wasCoreLoop) card.innerHTML = '';
      card.classList.remove('core-loop-card');
      document.querySelectorAll('.hotspot').forEach(el => el.classList.remove('active'));
      if (titlePanel) {
        titlePanel.classList.remove('active');
        titlePanel.setAttribute('aria-pressed', 'false');
      }
    }

    places.forEach((place) => {
      const btn = document.createElement('button');
      btn.className = 'hotspot';
      btn.dataset.id = place.id;
      btn.style.setProperty('--x', place.x + '%');
      btn.style.setProperty('--y', place.y + '%');
      btn.innerHTML = `<span class="label"><span class="zh">${place.zh}</span><span class="en">${place.en}</span></span><span class="dot"></span>`;
      btn.setAttribute('aria-label', `${place.zh} / ${place.en}`);
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        renderCard(place);
      });
      hotspots.appendChild(btn);
    });

    if (titlePanel) {
      const openWorldIntro = () => {
        renderCard(worldIntro);
        titlePanel.classList.add('active');
        titlePanel.setAttribute('aria-pressed', 'true');
      };
      titlePanel.addEventListener('click', (event) => {
        event.stopPropagation();
        openWorldIntro();
      });
      titlePanel.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        openWorldIntro();
      });
    }

    card.addEventListener('click', (event) => {
      const term = event.target.closest('.term-link');
      if (!term) return;
      event.stopPropagation();
      showTerm(term.dataset.term);
    });

    mapWrap.addEventListener('click', (event) => {
      if (event.target.closest('.hotspot') || event.target.closest('.card')) return;
      hideCard();
    });

    if (loopToggle) {
      loopToggle.addEventListener('click', (event) => {
        event.stopPropagation();
        if (selectedPlace && selectedPlace.id === 'core-loop' && !card.classList.contains('hidden')) {
          hideCard();
          setLoopVisible(false);
          return;
        }
        renderCard(coreLoopIntro);
        setLoopVisible(false);
      });
    }

    document.addEventListener('pointerdown', (event) => {
      if (!document.body.classList.contains('loop-visible')) return;
      if (loopPanel && loopPanel.contains(event.target)) return;
      setLoopVisible(false);
    }, true);

    window.addEventListener('resize', () => positionCard(selectedPlace));

    startAgentLoop();
    hideCard();
    setLoopVisible(false);
  </script>
</body>
</html>
